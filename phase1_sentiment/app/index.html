<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CITASC2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D0F14;
      --surface:   #181B24;
      --border:    #2A2D38;
      --text:      #E8EAF0;
      --muted:     #6B7280;
      --pos:       #00E5A0;
      --neg:       #FF4D6A;
      --neutral:   #4A90D9;
      --accent:    #00E5A0;
      --font-d:    'Space Grotesk', sans-serif;
      --font-b:    'Inter', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /*  Header  */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      display: grid;
      place-items: center;
      font-family: var(--font-d);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .logo-text {
      font-family: var(--font-d);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .logo-text span {
      color: var(--text);
    }

    .header-badge {
      margin-left: auto;
      font-family: var(--font-d);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.25rem 0.6rem;
      text-transform: uppercase;
    }

    /*  Main  */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 3rem;
      gap: 0;
    }

    /*  Hero  */
    .hero {
      text-align: center;
      max-width: 560px;
      margin-bottom: 3.5rem;
    }

    .hero-eyebrow {
      font-family: var(--font-d);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .hero h1 {
      font-family: var(--font-d);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /*  Card  */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    /*  Textarea  */
    .field-label {
      font-family: var(--font-d);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 1rem;
      line-height: 1.65;
      padding: 1rem 1.25rem;
      resize: vertical;
      min-height: 130px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: var(--accent);
    }

    /*  Exemples  */
    .exemples {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .ex-label {
      font-family: var(--font-d);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      align-self: center;
      margin-right: 0.25rem;
    }

    .exemple-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-b);
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .exemple-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /*  Bouton analyser  */
    .btn-analyze {
      margin-top: 1.5rem;
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-d);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.9rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    .btn-analyze:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-analyze:not(:disabled):hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Scan line animée */
    .btn-analyze.scanning::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,229,160,0.3), transparent);
      animation: scan 0.7s ease-in-out;
    }

    @keyframes scan {
      from { left: -100%; }
      to   { left: 100%; }
    }

    /*  Résultat  */
    .result-wrapper {
      width: 100%;
      max-width: 680px;
      margin-top: 1.5rem;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .result-wrapper.visible {
      max-height: 400px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      padding: 1.75rem 2rem;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .result-verdict {
      font-family: var(--font-d);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.3s;
    }

    .result-verdict.pos { color: var(--pos); }
    .result-verdict.neg { color: var(--neg); }

    .result-score-box {
      text-align: right;
    }

    .score-value {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .score-label {
      font-size: 0.7rem;
      font-family: var(--font-d);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /*  Barre de confiance (signature)  */
    .confidence-track {
      height: 6px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
    }

    .confidence-fill.pos { background: var(--pos); }
    .confidence-fill.neg { background: var(--neg); }

    .confidence-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      font-family: var(--font-d);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /*  Historique  */
    .history-section {
      width: 100%;
      max-width: 680px;
      margin-top: 2.5rem;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .history-title {
      font-family: var(--font-d);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-d);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--neg); }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left-width: 3px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .history-item.pos { border-left-color: var(--pos); }
    .history-item.neg { border-left-color: var(--neg); }
    .history-item:hover { border-color: var(--muted); border-left-color: inherit; }

    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .history-dot.pos { background: var(--pos); }
    .history-dot.neg { background: var(--neg); }

    .history-text {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-pct {
      font-family: var(--font-d);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
    }

    /*  Erreur  */
    .error-msg {
      width: 100%;
      max-width: 680px;
      margin-top: 1rem;
      padding: 0.85rem 1.25rem;
      border: 1px solid var(--neg);
      background: rgba(255, 77, 106, 0.08);
      color: var(--neg);
      font-family: var(--font-d);
      font-size: 0.82rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    /*  Footer  */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .footer-info {
      font-family: var(--font-d);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 0.4rem;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--pos); }
    .status-dot.offline { background: var(--neg); }

    @media (max-width: 600px) {
      main { padding: 2.5rem 1rem; }
      .card, .result-card { padding: 1.25rem; }
      .hero h1 { font-size: 1.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">CT</div>
  <div class="logo-text"><span>CITASC</span>2026</div>
</header>

<main>
  <div class="hero">
    <h1>Analyse de sentiment</h1>
  </div>

  <div class="card">
    <label class="field-label" for="input-texte">Texte à analyser</label>
    <textarea
      id="input-texte"
      placeholder="Ex : Ce produit est excellent, je suis très satisfait de ma commande…"
      rows="5"
    ></textarea>

    <div class="exemples">
      <span class="ex-label">Essayer</span>
      <button class="exemple-btn" data-txt="Ce service est excellent, je suis très satisfait !">Positif 1</button>
      <button class="exemple-btn" data-txt="Produit inutilisable, retour impossible, argent perdu.">Negatif 1</button>
      <button class="exemple-btn" data-txt="Livraison rapide et emballage soigné, je recommande.">Positif 2</button>
      <button class="exemple-btn" data-txt="Arnaque totale, je déconseille fortement ce vendeur.">Negatif 2</button>
    </div>

    <button class="btn-analyze" id="btn-analyze">Analyser le sentiment</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="result-wrapper" id="result-wrapper">
    <div class="result-card">
      <div class="result-header">
        <div class="result-verdict" id="result-verdict">—</div>
        <div class="result-score-box">
          <div class="score-value" id="score-value">—</div>
          <div class="score-label">Confiance</div>
        </div>
      </div>
      <div class="confidence-track">
        <div class="confidence-fill" id="confidence-fill"></div>
      </div>
      <div class="confidence-meta">
        <span>Négatif</span>
        <span>Positif</span>
      </div>
    </div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="history-header">
      <span class="history-title">Historique de session</span>
      <button class="clear-btn" id="clear-btn">Effacer</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</main>

<footer>
  <div class="footer-info">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Verification de l'API...</span>
  </div>
  <div class="footer-info">
    <a href="/docs" style="color:var(--muted);text-decoration:none;transition:color 0.15s"
       onmouseover="this.style.color='var(--accent)'"
       onmouseout="this.style.color='var(--muted)'">
      Documentation
    </a>
  </div>
</footer>

<script>
  const API = ''; 
  const textarea    = document.getElementById('input-texte');
  const btnAnalyze  = document.getElementById('btn-analyze');
  const resultWrap  = document.getElementById('result-wrapper');
  const verdict     = document.getElementById('result-verdict');
  const scoreVal    = document.getElementById('score-value');
  const confFill    = document.getElementById('confidence-fill');
  const errorMsg    = document.getElementById('error-msg');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const histSection = document.getElementById('history-section');
  const histList    = document.getElementById('history-list');
  const clearBtn    = document.getElementById('clear-btn');

  let history = [];

  //  Health check au chargement 
  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        const d = await r.json();
        statusDot.className  = 'status-dot online';
        statusText.textContent = `API en ligne`;
      } else {
        throw new Error();
      }
    } catch {
      statusDot.className  = 'status-dot offline';
      statusText.textContent = 'API hors ligne — lancez uvicorn 02_serve:app';
    }
  }

  //  Analyser 
  async function analyser(texte) {
    showError('');
    btnAnalyze.disabled = true;
    btnAnalyze.textContent = 'Analyse en cours...';
    btnAnalyze.classList.add('scanning');

    try {
      const r = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texte }),
      });

      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: `Erreur ${r.status}` }));
        throw new Error(err.detail || `Erreur ${r.status}`);
      }

      const data = await r.json();
      afficherResultat(data);
      ajouterHistorique(data);

    } catch (e) {
      showError(e.message || 'Erreur de connexion a l\'API.');
    } finally {
      btnAnalyze.disabled = false;
      btnAnalyze.textContent = 'Analyser le sentiment';
      setTimeout(() => btnAnalyze.classList.remove('scanning'), 700);
    }
  }

  function afficherResultat(data) {
    const cls = data.positif ? 'pos' : 'neg';
    const pct = Math.round(data.score * 100);

    verdict.textContent = data.positif ? 'Positif' : 'Negatif';
    verdict.className   = `result-verdict ${cls}`;
    scoreVal.textContent = `${pct}%`;

    confFill.className = `confidence-fill ${cls}`;
    // Reset puis anime
    confFill.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        confFill.style.width = `${pct}%`;
      });
    });

    resultWrap.classList.add('visible');
    resultWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function ajouterHistorique(data) {
    history.unshift(data);
    if (history.length > 6) history.pop();
    renderHistorique();
  }

  function renderHistorique() {
    if (history.length === 0) {
      histSection.style.display = 'none';
      return;
    }
    histSection.style.display = 'block';
    histList.innerHTML = '';
    history.forEach(item => {
      const cls = item.positif ? 'pos' : 'neg';
      const pct = Math.round(item.score * 100);
      const el  = document.createElement('div');
      el.className = `history-item ${cls}`;
      el.innerHTML = `
        <div class="history-dot ${cls}"></div>
        <div class="history-text">${escapeHtml(item.texte)}</div>
        <div class="history-pct">${pct}%</div>
      `;
      el.addEventListener('click', () => {
        textarea.value = item.texte;
        textarea.focus();
        afficherResultat(item);
      });
      histList.appendChild(el);
    });
  }

  function showError(msg) {
    if (msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    } else {
      errorMsg.classList.remove('visible');
    }
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  //  Evenements 
  btnAnalyze.addEventListener('click', () => {
    const t = textarea.value.trim();
    if (!t) { showError('Le texte ne peut pas etre vide.'); return; }
    analyser(t);
  });

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      btnAnalyze.click();
    }
  });

  document.querySelectorAll('.exemple-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      textarea.value = btn.dataset.txt;
      textarea.focus();
      showError('');
    });
  });

  clearBtn.addEventListener('click', () => {
    history = [];
    renderHistorique();
    resultWrap.classList.remove('visible');
  });

  //  Init 
  checkHealth();
</script>
</body>
</html>
